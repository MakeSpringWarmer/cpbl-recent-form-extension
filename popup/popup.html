<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPBL Recent Form</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div class="eyebrow">CPBL Recent Form</div>
      <h1>近期場數</h1>
      <p>調整球員頁上方的近況摘要區間。</p>
    </header>

    <div class="preset-row" aria-label="常用場數">
      <button type="button" data-count="3">3 場</button>
      <button type="button" data-count="5">5 場</button>
      <button type="button" data-count="10">10 場</button>
    </div>

    <label for="gameCount">自訂場數</label>
    <div class="field-row">
      <input id="gameCount" type="number" min="1" max="20" step="1">
      <span>場</span>
    </div>
    <p id="status" role="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
